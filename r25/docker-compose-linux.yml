# ============================================================
# Docker Compose 配置文件 (Linux 容器，推荐使用)
# 企业内部组件配置与接口联调平台
# ============================================================

version: '3.8'

services:
  # ============================================================
  # 后端服务 - Spring Boot
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.linux
    image: component-config-backend:latest
    container_name: component-config-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # JVM 运行参数
      - JAVA_OPTS=-Xms256m -Xmx512m
      # Spring Boot 配置（可选）
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    volumes:
      # 挂载 H2 数据库文件（数据持久化）
      - ./backend/data:/app/data
      # 挂载日志目录
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/component/list?current=1&size=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - component-config-network

  # ============================================================
  # 前端服务 - Vue 3 + Nginx
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.linux
    image: component-config-frontend:latest
    container_name: component-config-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      # 挂载 Nginx 日志
      - ./frontend/logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - component-config-network

# ============================================================
# 网络配置
# ============================================================
networks:
  component-config-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
