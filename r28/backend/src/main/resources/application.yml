server:
  port: 8080

spring:
  application:
    name: server-monitor
  
  datasource:
    url: jdbc:mysql://localhost:3307/monitor_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

jwt:
  secret: monitor-system-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.monitor: DEBUG
    org.springframework.security: INFO
