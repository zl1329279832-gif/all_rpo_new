server:
  port: 8080

spring:
  application:
    name: collaborative-whiteboard

  datasource:
    url: jdbc:mysql://localhost:3306/collab_whiteboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.collab.whiteboard: DEBUG
    org.springframework.web.socket: DEBUG

whiteboard:
  redis:
    prefix: "whiteboard:"
    room-expire: 86400
