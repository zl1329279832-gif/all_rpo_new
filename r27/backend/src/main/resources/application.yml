server:
  port: 8080

spring:
  application:
    name: online-course-system
  
  datasource:
    url: jdbc:mysql://localhost:3307/online_course_system?useUnicode=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

app:
  upload:
    path: ./uploads
  
  jwt:
    secret: online-course-system-jwt-secret-key-2024-very-long-secret
    expiration: 86400000

logging:
  level:
    com.example.onlinecoursesystem: DEBUG
    org.springframework.security: INFO
